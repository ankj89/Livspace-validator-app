<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Site Validation Tool</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{font-family:Arial;margin:0;background:#f4f6fb}

header{background:#1e3d8f;color:white;padding:14px;font-size:18px}

.container{padding:14px;max-width:1400px;margin:auto}

.card{background:white;padding:16px;margin-bottom:14px;border-radius:8px;border:1px solid #ddd}

.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

@media(max-width:900px){.grid{grid-template-columns:1fr}}

.field label{font-size:13px;font-weight:bold;display:block;margin-bottom:4px}

input,select,textarea{width:100%;padding:8px;border-radius:6px;border:1px solid #ccc}

textarea{height:60px}

.sectionHeader{background:#eef2ff;padding:8px;border-radius:6px;margin-top:14px;font-weight:bold}

button{padding:10px 16px;border:none;background:#1e3d8f;color:white;border-radius:6px;margin:4px;cursor:pointer}

.roomTab{display:inline-block;padding:8px 12px;border:1px solid #ccc;margin:3px;border-radius:6px;cursor:pointer}

table{width:100%;border-collapse:collapse;margin-top:10px}

table th,table td{border:1px solid #ddd;padding:6px;text-align:center}

.question{margin-bottom:10px}

</style>
</head>

<body>

<header>Site Validation Tool</header>

<div class="container">

<div class="card">

<h3>Preliminary Project Details</h3>

<div class="grid">

<input id="pid" placeholder="PID" onchange="saveProject()">
<input id="cx" placeholder="Cx Name" onchange="saveProject()">
<input id="city" placeholder="City" onchange="saveProject()">
<input id="address" placeholder="Address" onchange="saveProject()">
<input id="society" placeholder="Society Name" onchange="saveProject()">
<input id="flat" placeholder="Flat No" onchange="saveProject()">
<input id="floorNo" placeholder="Floor No" onchange="saveProject()">

<select id="bhk" onchange="saveProject()">
<option>BHK</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
</select>

<select id="propertyType" onchange="saveProject()">
<option>Property Type</option>
<option>Bare shell</option>
<option>Builder finished</option>
<option>Resale</option>
</select>

<select id="serviceLift" onchange="saveProject()">
<option>Service lift available?</option>
<option>Yes</option>
<option>No</option>
</select>

<input id="serviceLiftSize" placeholder="Service lift size" onchange="saveProject()">

<select id="passengerLift" onchange="saveProject()">
<option>Passenger lift available?</option>
<option>Yes</option>
<option>No</option>
</select>

<select id="serviceLiftUsage" onchange="saveProject()">
<option>Service lift usage allowed?</option>
<option>Heavy material movement allowed</option>
<option>Heavy material movement Not allowed</option>
</select>

<select id="loadingArea" onchange="saveProject()">
<option>Debris loading area</option>
<option>Within 30 ft</option>
<option>More than 30 ft</option>
<option>Not present</option>
</select>

<select id="debrisDumping" onchange="saveProject()">
<option>Debris dumping allowed?</option>
<option>Yes</option>
<option>No</option>
</select>

<select id="vehicleEntry" onchange="saveProject()">
<option>Vehicle entry possible?</option>
<option>Yes</option>
<option>No</option>
</select>

<textarea id="societyRestrictions" placeholder="Society Restrictions" onchange="saveProject()"></textarea>

</div>
</div>

<div class="card">
<div id="roomTabs"></div>
<button onclick="addRoom()">Add Room</button>
</div>

<div class="card" id="roomForm"></div>

<div class="card">
<button onclick="saveData()">Save Data</button>
<button onclick="generateTestData()">Generate Test Data</button>
<button onclick="generateExcel()">Generate Excel</button>
</div>

</div>

<script>

const walls=["NW","EW","SW","WW"]
const modules=["1M","2M","3M","4M","6M","8M","10M","12M","AC Point","Fan"]

const roomQuestions=[
"Is there a requirement of PCC due to leveling issues/bare shell property?",
"Existing flooring in Good condition with with proper slope/levels?",
"Can we do tile on tile installation?",
"Is there sufficient height or clearance between the existing ceiling and obstructions to accommodate the false ceiling installation?",
"Are there visible undulations/uneven surface on the True Ceiling?",
"Is there any evidence of water leaks or moisture damage on the existing true ceiling?",
"Are the dimensions suitable for accommodating a sliding door system?",
"Can we change the size or location of windows?",
"Are the existing windows and window frames damaged?",
"Is there a possibility to relocate from one wall to another?",
"Is there any 15 Amp power Supply present?",
"Are there plumbing issues requiring repair?",
"Are existing plumbing lines outdated?",
"Is the main inlet valve accessible?",
"Is there sufficient space for shower cubicle?",
"Is WC relocation possible?",
"Do we need damp proof treatment?",
"Do we need weather proof treatment?",
"Is there existing countertop present?",
"Are there issues with the existing false ceiling?"
]

const wallQuestions=[
"Is the wall a load-bearing wall/Mivan Construction/Sheer wall?",
"Is the wall dry wall/Gypsum wall?",
"Are there major cracks requiring structural repair?",
"Does the existing wall surface have undulations requiring leveling?",
"Are the undulations more than 6 mm?",
"Are there minor cracks requiring re plastering?",
"Is core cut location available?",
"Are existing switch/socket working?",
"Can we reuse existing switch board?",
"Can split AC be installed post false ceiling?",
"Is AC panelling required?",
"Are there darker shades on wall?",
"Is existing paint condition good?",
"Do we need to remove skirting for wardrobe?"
]

const defaultRooms=["Living Room","Kitchen","Bedroom 1","Bedroom 2","Bathroom 1","Bathroom 2","Balcony"]

let roomOrder=[...defaultRooms]

let data=JSON.parse(localStorage.getItem("validatorData")||"{}")

if(!data.rooms)data.rooms={}
if(!data.project)data.project={}

defaultRooms.forEach(r=>{
if(!data.rooms[r])data.rooms[r]={measure:{},electrical:{},room:{},wall:{},wallSelection:{}}
})

function saveProject(){
data.project={
pid:pid.value,
cx:cx.value,
city:city.value,
address:address.value,
society:society.value,
flat:flat.value,
floorNo:floorNo.value
}
saveData()
}

function saveData(){
localStorage.setItem("validatorData",JSON.stringify(data))
}

function renderTabs(){
let html=""
roomOrder.forEach(r=>{
html+=`<span class="roomTab" onclick="openRoom('${r}')">${r}</span>`
})
document.getElementById("roomTabs").innerHTML=html
}

function store(room,section,key,val){
data.rooms[room][section][key]=val
saveData()
}

function storeWalls(room,q,el){
data.rooms[room].wallSelection[q]=[...el.selectedOptions].map(o=>o.value)
saveData()
}

function openRoom(room){

let html=`<h3>${room}</h3>`

html+=`<div class="sectionHeader">Measurements</div>
<div class="grid">

<input placeholder="Ceiling NW" onchange="store('${room}','measure','ceilingNW',this.value)">
<input placeholder="Ceiling NE" onchange="store('${room}','measure','ceilingNE',this.value)">
<input placeholder="Ceiling SW" onchange="store('${room}','measure','ceilingSW',this.value)">
<input placeholder="Ceiling SE" onchange="store('${room}','measure','ceilingSE',this.value)">
<input placeholder="Ceiling Center" onchange="store('${room}','measure','ceilingCenter',this.value)">

<input placeholder="Diagonal 1" onchange="store('${room}','measure','diag1',this.value)">
<input placeholder="Diagonal 2" onchange="store('${room}','measure','diag2',this.value)">

<input placeholder="Wall Deviation NW" onchange="store('${room}','measure','devNW',this.value)">
<input placeholder="Wall Deviation EW" onchange="store('${room}','measure','devEW',this.value)">
<input placeholder="Wall Deviation SW" onchange="store('${room}','measure','devSW',this.value)">
<input placeholder="Wall Deviation WW" onchange="store('${room}','measure','devWW',this.value)">

</div>`

html+=`<div class="sectionHeader">Electrical Modules</div><table><tr><th>Wall</th>`
modules.forEach(m=>html+=`<th>${m}</th>`)
html+=`</tr>`

walls.forEach(w=>{
html+=`<tr><td>${w}</td>`
modules.forEach(m=>{
html+=`<td><input onchange="store('${room}','electrical','${w}-${m}',this.value)"></td>`
})
html+=`</tr>`
})

html+=`</table>`

html+=`<div class="sectionHeader">Room Questions</div>`

roomQuestions.forEach(q=>{
html+=`
<div class="question">
<label>${q}</label>
<select onchange="store('${room}','room','${q}',this.value)">
<option></option>
<option>Yes</option>
<option>No</option>
</select>
<textarea placeholder="Add Comments"
onchange="store('${room}','room','${q}-comment',this.value)"></textarea>
</div>`
})

html+=`<div class="sectionHeader">Wall Questions</div>`

wallQuestions.forEach(q=>{
html+=`
<div class="question">
<label>${q}</label>
<select onchange="store('${room}','wall','${q}',this.value)">
<option></option>
<option>Yes</option>
<option>No</option>
</select>
<select multiple onchange="storeWalls('${room}','${q}',this)">
<option>NW</option>
<option>EW</option>
<option>SW</option>
<option>WW</option>
</select>
<textarea placeholder="Add Comments"
onchange="store('${room}','wall','${q}-comment',this.value)"></textarea>
</div>`
})

document.getElementById("roomForm").innerHTML=html
}

function generateTestData(){

pid.value="1234"
cx.value="Ankit"

document.querySelectorAll("select").forEach(s=>{
if([...s.options].some(o=>o.value==="Yes"))s.value="Yes"
})

document.querySelectorAll("textarea").forEach(t=>{
t.value="This is a test message"
})

}

function generateExcel(){

let rows=[]

Object.keys(data.rooms).forEach(room=>{
let r=data.rooms[room]

Object.entries(r.measure).forEach(([k,v])=>{
rows.push({Room:room,Section:"Measurement",Item:k,Value:v})
})

Object.entries(r.electrical).forEach(([k,v])=>{
rows.push({Room:room,Section:"Electrical",Item:k,Value:v})
})

Object.entries(r.room).forEach(([k,v])=>{
rows.push({Room:room,Section:"Room Question",Item:k,Value:v})
})

Object.entries(r.wall).forEach(([k,v])=>{
rows.push({Room:room,Section:"Wall Question",Item:k,Value:v})
})

})

let wb=XLSX.utils.book_new()
let ws=XLSX.utils.json_to_sheet(rows)

XLSX.utils.book_append_sheet(wb,ws,"Validation Data")
XLSX.writeFile(wb,"site_validation.xlsx")
}

function addRoom(){

let name=prompt("Room name")

if(!name)return

roomOrder.push(name)

data.rooms[name]={measure:{},electrical:{},room:{},wall:{},wallSelection:{}}

renderTabs()
}

renderTabs()
openRoom(defaultRooms[0])

</script>

</body>
</html>
