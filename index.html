<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Site Validation Tool</title>

<style>

body{font-family:Arial;margin:0;background:#f4f6fb;}

header{
background:#1e3d8f;
color:white;
padding:14px;
font-size:18px;
position:sticky;
top:0;
}

.container{
padding:14px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:16px;
margin-bottom:14px;
border-radius:8px;
border:1px solid #ddd;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:14px;
}

@media(max-width:900px){
.grid{grid-template-columns:1fr;}
}

.field label{
font-size:13px;
font-weight:bold;
display:block;
margin-bottom:4px;
}

input,select,textarea{
width:100%;
padding:9px;
border-radius:6px;
border:1px solid #ccc;
}

textarea{
height:70px;
}

textarea::placeholder{
color:#aaa;
}

button{
padding:11px 16px;
border:none;
background:#1e3d8f;
color:white;
border-radius:6px;
margin:4px;
cursor:pointer;
}

.roomNav{
position:sticky;
top:60px;
background:white;
padding:8px;
border-bottom:1px solid #ddd;
}

.roomTab{
display:inline-block;
padding:9px 14px;
border:1px solid #ccc;
margin:4px;
border-radius:6px;
cursor:pointer;
}

.sectionHeader{
background:#eef2ff;
padding:8px;
border-radius:6px;
margin-top:14px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

table th,table td{
border:1px solid #ddd;
padding:6px;
text-align:center;
}

.question{
margin-bottom:12px;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

<header>Site Validation Tool</header>

<div class="container">

<div class="card">

<h3>Preliminary Project Details</h3>

<div class="grid">

<div class="field">
<label>PID</label>
<input id="pid">
</div>

<div class="field">
<label>Customer Name</label>
<input id="cx">
</div>

<div class="field">
<label>City</label>
<input id="city">
</div>

<div class="field">
<label>Address</label>
<input id="address">
</div>

<div class="field">
<label>Society</label>
<input id="society">
</div>

<div class="field">
<label>Flat No</label>
<input id="flat">
</div>

<div class="field">
<label>Service Lift Available</label>
<select id="serviceLift">
<option></option>
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="field">
<label>Service Lift Size</label>
<input id="liftSize">
</div>

<div class="field">
<label>Passenger Lift Usage</label>
<select id="passLift">
<option></option>
<option>Allowed</option>
<option>Not Allowed</option>
<option>No Lift</option>
</select>
</div>

<div class="field">
<label>Vehicle Entry</label>
<select id="vehicle">
<option></option>
<option>Small Vehicles</option>
<option>Large Vehicles</option>
<option>Not Allowed</option>
</select>
</div>

<div class="field">
<label>Power Supply Available</label>
<select id="power">
<option></option>
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="field">
<label>Water Supply Available</label>
<select id="water">
<option></option>
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="field">
<label>Mivan Construction</label>
<select id="mivan">
<option></option>
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="field">
<label>Demolition Allowed</label>
<select id="demo">
<option></option>
<option>Manual</option>
<option>Mechanised</option>
<option>Both</option>
</select>
</div>

<div class="field">
<label>Work Timing Restrictions</label>
<input id="workTime">
</div>

<div class="field">
<label>Society Restrictions</label>
<textarea id="societyRestrictions" placeholder="Add Comments"></textarea>
</div>

</div>

</div>

<div class="roomNav">
<div id="roomTabs"></div>
<button onclick="addRoom()">Add Room</button>
</div>

<div class="card" id="roomForm"></div>

<div class="card">

<button onclick="generateExcel()">Generate Excel</button>
<button onclick="fillTestData()">Fill Test Data</button>
<button onclick="clearAllData()">Clear All Data</button>

</div>

</div>

<script>

const walls=["NW","EW","SW","WW"]

const defaultRooms=[
"Living Room","Kitchen","Bedroom 1","Bedroom 2","Bathroom 1","Bathroom 2","Balcony"
]

const roomQuestions=[
"False ceiling clearance sufficient",
"Ceiling undulation present",
"Water leakage on ceiling",
"Sliding system feasible",
"Window modification possible",
"Window condition poor",
"Module relocation possible",
"15A power supply present",
"Plumbing issues present",
"Plumbing outdated",
"Main inlet valve accessible",
"Space for shower cubicle",
"WC relocation possible",
"Damp proof required",
"Weather proof required",
"Existing countertop present",
"False ceiling damage",
"Door condition poor",
"Door refurbishable",
"Termite infestation present"
]

const wallQuestions=[
"Load bearing wall / Mivan wall",
"Dry wall / Gypsum wall",
"Major cracks requiring structural repair",
"Surface undulation",
"Undulation more than 6mm",
"Minor cracks / loose plaster",
"Core cut location available",
"Switch/socket working condition",
"Switchboard reusable",
"Split AC possible",
"Dark shade on wall",
"Paint condition poor"
]

let data={rooms:{}}

function init(){

defaultRooms.forEach(r=>{
data.rooms[r]={measurements:{},electrical:{},room:{},walls:{}}
})

renderTabs()

}

function renderTabs(){

let html=""

Object.keys(data.rooms).forEach(r=>{
html+=`<span class="roomTab" onclick="openRoom('${r}')">${r}</span>`
})

document.getElementById("roomTabs").innerHTML=html

}

function addRoom(){

let name=prompt("Room name")

if(!name)return

data.rooms[name]={measurements:{},electrical:{},room:{},walls:{}}

renderTabs()

}

function openRoom(room){

let r=data.rooms[room]

let html=`<h3>${room}</h3>`

html+=`<div class="sectionHeader">Ceiling Height</div>

<div class="grid">
<input placeholder="NW" oninput="saveMeasure('${room}','nw',this.value)">
<input placeholder="NE" oninput="saveMeasure('${room}','ne',this.value)">
<input placeholder="SE" oninput="saveMeasure('${room}','se',this.value)">
<input placeholder="SW" oninput="saveMeasure('${room}','sw',this.value)">
<input placeholder="Center" oninput="saveMeasure('${room}','center',this.value)">
</div>`

html+=`<div class="sectionHeader">Electrical</div>

<table>
<tr><th>Wall</th><th>4M</th><th>6M</th><th>8M</th></tr>`

walls.forEach(w=>{

html+=`<tr>
<td>${w}</td>
<td><input oninput="saveElec('${room}','${w}','4M',this.value)"></td>
<td><input oninput="saveElec('${room}','${w}','6M',this.value)"></td>
<td><input oninput="saveElec('${room}','${w}','8M',this.value)"></td>
</tr>`

})

html+="</table>"

html+=`<div class="sectionHeader">Room Observations</div>`

roomQuestions.forEach(q=>{
html+=`
<div class="question">

<label>${q}</label>

<select oninput="saveRoom('${room}','${q}',this.value)">
<option></option>
<option>Yes</option>
<option>No</option>
<option>N.A</option>
</select>

<textarea placeholder="Add Comments" oninput="saveRoomComment('${room}','${q}',this.value)"></textarea>

</div>
`
})

html+=`<div class="sectionHeader">Wall Observations</div>`

wallQuestions.forEach(q=>{
html+=`
<div class="question">

<label>${q}</label>

<select oninput="saveWall('${room}','${q}','answer',this.value)">
<option></option>
<option>Yes</option>
<option>No</option>
<option>N.A</option>
</select>

<select multiple oninput="saveWallWalls('${room}','${q}',this)">
<option>NW</option>
<option>EW</option>
<option>SW</option>
<option>WW</option>
</select>

<textarea placeholder="Add Comments" oninput="saveWall('${room}','${q}','comment',this.value)"></textarea>

</div>
`
})

document.getElementById("roomForm").innerHTML=html

}

function saveMeasure(r,k,v){data.rooms[r].measurements[k]=v}

function saveElec(r,w,t,v){
if(!data.rooms[r].electrical[w])data.rooms[r].electrical[w]={}
data.rooms[r].electrical[w][t]=v
}

function saveRoom(r,q,v){
if(!data.rooms[r].room[q])data.rooms[r].room[q]={}
data.rooms[r].room[q].answer=v
}

function saveRoomComment(r,q,v){
data.rooms[r].room[q].comment=v
}

function saveWall(r,q,t,v){
if(!data.rooms[r].walls[q])data.rooms[r].walls[q]={}
data.rooms[r].walls[q][t]=v
}

function saveWallWalls(r,q,e){
let s=[...e.selectedOptions].map(o=>o.value)
data.rooms[r].walls[q].walls=s
}

function generateExcel(){

let roomObs=[]
let wallObs=[]

Object.keys(data.rooms).forEach(room=>{

let r=data.rooms[room]

Object.entries(r.room).forEach(([q,v])=>{
roomObs.push({Room:room,Question:q,Answer:v.answer,Comment:v.comment})
})

Object.entries(r.walls).forEach(([q,v])=>{
wallObs.push({Room:room,Question:q,Answer:v.answer,Walls:(v.walls||[]).join(","),Comment:v.comment})
})

})

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(roomObs),"Room Observations")
XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(wallObs),"Wall Observations")

XLSX.writeFile(wb,"site_validation.xlsx")

}

function fillTestData(){

pid.value="TEST001"
cx.value="Test Customer"

alert("Test data loaded")

}

function clearAllData(){
location.reload()
}

init()

</script>

</body>
</html>
